name: Build desktop app

# PyInstaller cannot cross-compile -- a Mac produces only a Mac build, a
# Windows machine only a Windows build. This matrix runs both from the same
# commit/tag so the two installers are never out of sync with each other.
#
# This workflow is CI only: it produces downloadable build artifacts, not a
# distribution channel. The owner downloads them from the Actions run and
# places them in the shared Drive/Dropbox folder staff already use for the
# SKU map (see README.md) -- staff never touch GitHub.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {} # manual "Run workflow" button, for test builds between tags

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: LabelSorter-Mac
          - os: windows-latest
            artifact_name: LabelSorter-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.10

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm LabelSorter.spec

      # --- macOS packaging ---
      - name: Package .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "LabelSorter" -srcfolder dist/LabelSorter.app \
            -ov -format UDZO "LabelSorter-Mac-${{ steps.version.outputs.value }}.dmg"

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.value }}
          path: LabelSorter-Mac-${{ steps.version.outputs.value }}.dmg
          retention-days: 90

      # --- Windows packaging ---
      # A plain zip of the onedir build. Swap in an Inno Setup .iss script
      # here later for a proper installer (Start Menu shortcut, uninstaller);
      # a zip is the correctness baseline -- staff just extract and run the
      # .exe inside, per the install guide.
      - name: Package .zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\LabelSorter -DestinationPath "LabelSorter-Windows-${{ steps.version.outputs.value }}.zip"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.value }}
          path: LabelSorter-Windows-${{ steps.version.outputs.value }}.zip
          retention-days: 90
